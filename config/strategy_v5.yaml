# V5优化策略配置
# Strategy V5 Configuration - 参数优化版

strategy:
  name: "V5 Optimized"
  version: "5.0"
  type: "ma"
  description: "基于网格搜索优化的MA + MACD + RSI策略"

# 股票池配置 - 使用优化后的参数
stocks:
  - code: "300750"
    name: "宁德时代"
    weight: 0.40
    params:
      ma_fast: 10
      ma_slow: 35
      atr_stop: 1.5
    enabled: true
  
  - code: "002475"
    name: "立讯精密"
    weight: 0.30
    params:
      ma_fast: 15
      ma_slow: 20
      atr_stop: 1.5
    enabled: true
  
  - code: "601318"
    name: "中国平安"
    weight: 0.15
    params:
      ma_fast: 7
      ma_slow: 30
      atr_stop: 3.0
    enabled: true
  
  - code: "600276"
    name: "恒瑞医药"
    weight: 0.15
    params:
      ma_fast: 5
      ma_slow: 20
      atr_stop: 1.5
    enabled: true

# 风险控制参数 - 更保守
risk:
  stop_loss: -0.06          # 止损 -6%
  take_profit_1: 0.08       # 止盈1 +8% (卖50%)
  take_profit_2: 0.15       # 止盈2 +15% (清仓)
  max_position: 0.20        # 单股最大仓位 20%
  max_drawdown: 0.12        # 最大回撤 12%

# 资金管理
capital:
  initial: 100000           # 初始资金 10万
  reserve_ratio: 0.15       # 现金储备 15%

# 数据源配置
data:
  source: "tushare"         # 数据源: tushare/yfinance
  update_interval: 1        # 数据更新间隔(天)
  lookback_days: 100        # 回溯天数

# 监控配置
monitor:
  enabled: true
  alert_channels:
    - "feishu"
  check_interval: 30        # 检查间隔(分钟)

# 回测配置
backtest:
  commission: 0.0003        # 手续费 0.03%
  slippage: 0.0001          # 滑点 0.01%
  benchmark: "000300.SH"    # 基准指数

# 日志配置
logging:
  level: "INFO"
  file: "logs/strategy_v5.log"
  max_size: "10MB"
  backup_count: 5

# 优化信息
optimization:
  timestamp: "2026-03-11T11:41:18"
  method: "grid_search"
  stocks_optimized: 4
  avg_sharpe: 26.57
  avg_return: 1239.18%
